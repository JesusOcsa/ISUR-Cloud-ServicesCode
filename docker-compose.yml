version: '3.8'

services:

  db:
    image: mysql:8.0
    container_name: isur-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: isurdb
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  app:
    build: .
    container_name: isur-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
    depends_on:
      - db

volumes:
  mysql-data: